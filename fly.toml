# fly.toml app configuration file generated for custody-scheduler-api on 2026-07-19T21:20:03-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'custody-scheduler-api'
primary_region = 'iad'

[build]
[env]
  DATABASE_URL = 'sqlite:////data/custody.db'

[[mounts]]
  source = 'sqlite_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
